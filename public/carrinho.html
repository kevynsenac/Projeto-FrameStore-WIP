<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrameStore | Meu Carrinho</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/homepage.css">
  <link rel="stylesheet" href="css/carrinho.css">
  <link rel="icon" type="image/png" href="img/site_favicon.png">
</head>
<body>

  <header class="navbar">
    <div class="logo-container">
      <div class="dashboard-menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <a href="homepage.html" class="logo-link">
        <img src="img/site_logo.png" alt="Logo" class="logo-unico">
        <img src="img/site_nome.png" alt="FrameStore" class="logo-nome">
      </a>
    </div>

    <div class="user-actions">
      <a href="pontos.html" class="action-badge points-badge">
        <i class="fas fa-star"></i> <span id="nav-pontos">0</span> Pts
      </a>

      <a href="saldos.html" class="action-badge balance-badge" title="Adicionar fundos" style="text-decoration: none;">
        <i class="fas fa-wallet"></i> <span id="nav-saldo">R$ 0,00</span>
      </a>

      <div id="auth-container" style="display: inline-block;">
        <a href="login.html">
          <button class="btn-entrar">Entrar</button>
        </a>
      </div>
    </div>
  </header>

  <aside class="sidebar-menu" id="sidebar">
    <div class="sidebar-header">
      <div class="dashboard-menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <ul>
      <li><a href="homepage.html"><i class="fas fa-home"></i> Início</a></li>
      <li><a href="#"><i class="fas fa-tag"></i> Ofertas</a></li>
      <li><a href="#"><i class="fas fa-gift"></i> Gift Cards</a></li>
      <li><a href="#"><i class="fas fa-desktop"></i> PC</a></li>
      <li><a href="#"><i class="fab fa-playstation"></i> Playstation</a></li>
      <li><a href="#"><i class="fab fa-xbox"></i> Xbox</a></li>
    </ul>
  </aside>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

  <main class="cart-wrapper">
    <div id="loading-spinner" class="loading-container">
      <div class="spinner"></div>
      <p>Carregando seu carrinho...</p>
    </div>

    <div class="cart-container" id="cart-content" style="display: none;">
      <section class="cart-items">
        <h2>Meu Carrinho</h2>
        <div id="cart-list"></div>
      </section>

      <aside class="cart-summary">
        <h2>Resumo do Pedido</h2>
        <div class="summary-row">
          <span>Subtotal:</span>
          <span id="cart-subtotal">R$ 0,00</span>
        </div>

        <div class="coupon-section">
          <label for="coupon-select">Aplicar Cupom:</label>
          <select id="coupon-select" onchange="calcularTotal()">
            <option value="">Nenhum cupom selecionado</option>
          </select>
          
          <div class="summary-row" style="margin-top: 15px; color: #ff4757; display: none;" id="discount-row">
            <span>Desconto:</span>
            <span id="cart-discount">- R$ 0,00</span>
          </div>
        </div>

        <div class="summary-row summary-total">
          <span>Total:</span>
          <span id="cart-total">R$ 0,00</span>
        </div>

        <button class="btn-checkout" id="btn-finalizar" onclick="finalizarCompra()">
          Finalizar Compra
        </button>
      </aside>
    </div>
  </main>

  <script src="js/homepage.js"></script>
  <script src="js/carrinho.js"></script>
</body>
</html>
