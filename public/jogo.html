<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrameStore | Detalhes do Jogo</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/homepage.css" />
    <link rel="stylesheet" href="css/jogo.css" />
    <link rel="icon" type="image/png" href="img/site_favicon.png" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo-container">
        <div class="dashboard-menu" onclick="toggleMenu()">
          <span></span><span></span><span></span>
        </div>

        <a href="homepage.html" class="logo-link">
          <img src="img/site_logo.png" alt="Logo" class="logo-unico" />
          <img src="img/site_nome.png" alt="FrameStore" class="logo-nome" />
        </a>
      </div>

      <div class="user-actions">
        <a href="pontos.html" class="action-badge points-badge">
          <i class="fas fa-star"></i> <span id="nav-pontos">0</span> Pts
        </a>
        <a href="carrinho.html" class="action-badge cart-badge">
          <i class="fas fa-shopping-cart"></i> <span>Carrinho</span>
          <span id="cart-count" class="cart-count" style="display: none"
            >0</span
          >
        </a>
        <div id="auth-container" style="display: inline-block">
          <a href="login.html">
            <button class="btn-entrar">Entrar</button>
          </a>
        </div>
      </div>
    </header>

    <main class="product-page">
      <div id="loading-spinner" class="loading-container">
        <div class="spinner"></div>
        <p>Buscando detalhes do jogo...</p>
      </div>

      <div id="game-content" style="display: none">
        <h1 class="game-title"></h1>

        <div class="game-details-container">
          
          <!-- NOVA DIV: Coluna da Esquerda -->
          <div class="left-column">
            <div class="game-gallery">
              <div class="main-view">
                <button class="nav-arrow prev-img" onclick="moveGallery(-1)">❮</button>
                <img id="current-img" alt="Jogo" />
                <button class="nav-arrow next-img" onclick="moveGallery(1)">❯</button>
              </div>
              <div class="thumb-list"></div>
            </div>

            <!-- NOVA SEÇÃO: Descrição e Requisitos -->
            <div class="game-info-sections">
              <div class="game-description">
                <h2>Sobre o Jogo</h2>
                <p id="game-desc-text"></p>
              </div>
              <div class="game-requirements">
                <h2>Requisitos do Sistema</h2>
                <div id="game-req-text"></div>
              </div>
            </div>
          </div>

          <aside class="purchase-card">
            <div class="price-section"></div>

            <div class="platform-info-card" id="platform-card">
              <i id="platform-icon" class="fab fa-steam"></i>
              <div class="info-text">
                <strong id="game-platform">Steam</strong>
              </div>
            </div>

            <p class="activation-msg">Ativado através de Chave de ativação</p>

            <div class="buy-wishlist-buttons">
              <button
                class="btn-purchase-green"
                onclick="adicionarAoCarrinho()"
              >
                <i class="fas fa-cart-plus"></i> Adicionar ao Carrinho
              </button>
            </div>
          </aside>

          <div id="cart-modal" class="modal-cart">
            <div class="modal-content">
              <span class="close-modal" onclick="fecharCarrinho()"
                >&times;</span
              >
              <h2>Adicionado ao Carrinho!</h2>
              <div id="cart-items-list"></div>
              <div
                class="cart-footer"
                style="
                  display: flex;
                  gap: 10px;
                  justify-content: space-between;
                  margin-top: 20px;
                "
              >
                <button
                  class="btn-entrar"
                  style="background: #444; color: white"
                  onclick="window.location.href = 'homepage.html'"
                >
                  Continuar Comprando
                </button>
                <button
                  class="btn-checkout"
                  onclick="window.location.href = 'carrinho.html'"
                >
                  Ir para o Pagamento
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="js/homepage.js"></script>
    <script src="js/jogo.js"></script>
  </body>
</html>
